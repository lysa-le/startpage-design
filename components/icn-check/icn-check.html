<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Check Icon — Startpage Design System</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-text-primary:          var(--color-whisper-100);
      --color-text-secondary:        var(--color-midnight-200);
      --color-text-inverted:         var(--color-black-800);
      --color-icon-primary:          var(--color-whisper-200);
      --color-icon-secondary:        var(--color-brand-blue-200);
      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-primary-button: var(--color-brand-blue-200);
      --color-button-inactive:       var(--color-black-600);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-family);
      padding: var(--spacing-48);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    h1 {
      font-size: var(--font-heading-xs);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-8);
    }

    .subtitle {
      font-size: var(--font-body-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-48);
    }

    .section {
      margin-bottom: var(--spacing-48);
    }

    .section-label {
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--spacing-20);
    }

    .row {
      display: flex;
      align-items: flex-end;
      gap: var(--spacing-32);
      flex-wrap: wrap;
    }

    .variant-cell {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-12);
    }

    .variant-label {
      font-size: var(--font-body-xs);
      color: var(--color-text-secondary);
      min-width: 56px;
      text-align: center;
    }

    /* ─────────────────────────────────────────────
       icn-check
       ───────────────────────────────────────────── */
    .icn-check {
      appearance: none;
      border: none;
      padding: 0;
      background: transparent;
      cursor: pointer;

      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;

      color: var(--color-icon-secondary);
      border-radius: var(--radius-full);
      transition: color 0.15s ease, transform 0.15s ease;
    }

    .icn-check:hover {
      color: var(--color-icon-primary);
    }

    .icn-check:focus-visible {
      outline: var(--border-stroke-lg) solid var(--color-stroke-primary-button);
      outline-offset: 4px;
    }

    .icn-check svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    /* Size variants */
    .icn-check--lg {
      width: var(--spacing-16);
      height: var(--spacing-16);
    }

    .icn-check--sm {
      width: var(--spacing-12);
      height: var(--spacing-12);
    }

    /* ─────────────────────────────────────────────
       Theme toggle
       ───────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 100;
    }
    .theme-toggle:hover { color: var(--color-text-primary); border-color: var(--color-stroke-primary-button); }
    .theme-toggle:focus-visible { outline: var(--border-stroke-lg) solid var(--color-stroke-primary-button); outline-offset: 3px; }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>

  <h1>icn-check</h1>
  <p class="subtitle">
    Static checkmark. Default: brand blue (<code>--color-icon-secondary</code>); hover: primary.<br>
    Two sizes: large 16×16px and small 12×12px — same SVG paths, size controlled by CSS.
  </p>

  <!-- ── Sizes ── -->
  <div class="section">
    <p class="section-label">Sizes</p>
    <div class="row">

      <div class="variant-cell">
        <button class="icn-check icn-check--lg" aria-label="Confirmed">
          <svg viewBox="0 0 13.5 10.8306" fill="none" aria-hidden="true"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M0.750002 5.81251L4.95 9.75001L12.75 0.750012"/>
          </svg>
        </button>
        <span class="variant-label">large 16px</span>
      </div>

      <div class="variant-cell">
        <button class="icn-check icn-check--sm" aria-label="Confirmed">
          <svg viewBox="0 0 10.5 8.58056" fill="none" aria-hidden="true"
               stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
            <path d="M0.750002 4.54689L3.9 7.50001L9.75 0.750012"/>
          </svg>
        </button>
        <span class="variant-label">small 12px</span>
      </div>

    </div>
  </div>

  <script>
    const html      = document.documentElement;
    const themeBtn  = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const themeLbl  = document.getElementById('themeLabel');

    applyTheme(localStorage.getItem('theme') || 'light');

    themeBtn.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(t) {
      html.dataset.theme    = t;
      themeIcon.textContent = t === 'dark' ? '🌙' : '☀️';
      themeLbl.textContent  = t === 'dark' ? 'Dark'  : 'Light';
    }

    /* Press feedback */
    document.querySelectorAll('.icn-check').forEach(btn => {
      btn.addEventListener('mousedown', () => {
        btn.style.transform  = 'scale(0.88)';
        btn.style.transition = 'transform 0.08s ease';
        function onUp() {
          btn.style.transform  = 'scale(1.0)';
          btn.style.transition = 'transform 0.12s ease-out';
          btn.addEventListener('transitionend', () => {
            btn.style.transform  = '';
            btn.style.transition = '';
          }, { once: true });
          document.removeEventListener('mouseup', onUp);
        }
        document.addEventListener('mouseup', onUp);
      });
    });
  </script>
</body>
</html>
