<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>radio-button — Component Demo</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>

    /* ─────────────────────────────────────────────
       DARK MODE TOKEN OVERRIDES
       ───────────────────────────────────────────── */
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);

      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);

      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-200);
      --color-icon-tertiary:  var(--color-midnight-100);

      --color-button-brandblue:      var(--color-brand-blue-300);
      --color-button-inactive:       var(--color-black-600);

      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-secondary:      var(--color-black-550);
      --color-stroke-primary-button: var(--color-brand-blue-200);
    }

    /* ─────────────────────────────────────────────
       THEME TOGGLE
       ───────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 100;
    }
    .theme-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }

    /* ─────────────────────────────────────────────
       RESET & PAGE
       ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-background-quaternary);
      color: var(--color-text-primary);
      padding: var(--spacing-48);
      min-height: 100vh;
    }

    h1 {
      font-size: var(--font-heading-xs);
      line-height: var(--font-heading-xs-lh);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-8);
    }

    .page-subtitle {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-48);
    }

    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-48);
      align-items: flex-start;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-16);
    }

    .demo-group__title {
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .demo-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-24);
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-8);
    }

    .demo-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }

    /* ─────────────────────────────────────────────
       RADIO-BUTTON — BASE
       ───────────────────────────────────────────── */
    .radio-button {
      appearance: none;
      -webkit-appearance: none;
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: var(--radius-full);
      border: var(--border-stroke-md) solid var(--color-stroke-primary);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 150ms ease;
    }

    /* Inner dot — active/checked state */
    .radio-button::after {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      border-radius: var(--radius-full);
      background: var(--color-button-brandblue);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 150ms ease, transform 150ms ease;
    }

    .radio-button:checked {
      border-color: var(--color-stroke-primary-button);
    }

    .radio-button:checked::after {
      opacity: 1;
      transform: scale(1);
    }

    /* Focus ring */
    .radio-button:focus-visible {
      outline: var(--border-stroke-lg) solid var(--color-stroke-primary-button);
      outline-offset: 3px;
    }

    /* ─────────────────────────────────────────────
       RADIO-LABEL — with text
       ───────────────────────────────────────────── */
    .radio-label {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      cursor: pointer;
    }

    .radio-label__text {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      user-select: none;
    }

    /* ─────────────────────────────────────────────
       RADIO-GROUP — fieldset wrapper
       ───────────────────────────────────────────── */
    .radio-group {
      border: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
    }

    .radio-group__legend {
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--spacing-4);
    }

  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>

  <h1>radio-button</h1>
  <p class="page-subtitle">2 states — default · active (selected)</p>

  <div class="demo-grid">

    <!-- ── Icon only ── -->
    <div class="demo-group">
      <p class="demo-group__title">States</p>
      <div class="demo-row">
        <div class="demo-item">
          <input type="radio" class="radio-button" name="states-demo" aria-label="Default">
          <span class="demo-label">default</span>
        </div>
        <div class="demo-item">
          <input type="radio" class="radio-button" name="states-demo" checked aria-label="Active">
          <span class="demo-label">active</span>
        </div>
      </div>
    </div>

    <!-- ── With label ── -->
    <div class="demo-group">
      <p class="demo-group__title">With Label</p>
      <div class="demo-row">
        <label class="radio-label">
          <input type="radio" class="radio-button" name="label-demo">
          <span class="radio-label__text">Option</span>
        </label>
        <label class="radio-label">
          <input type="radio" class="radio-button" name="label-demo" checked>
          <span class="radio-label__text">Option</span>
        </label>
      </div>
    </div>

    <!-- ── Group ── -->
    <fieldset class="radio-group">
      <legend class="radio-group__legend">Group example</legend>
      <label class="radio-label">
        <input type="radio" class="radio-button" name="group-demo" value="web" checked>
        <span class="radio-label__text">Web results</span>
      </label>
      <label class="radio-label">
        <input type="radio" class="radio-button" name="group-demo" value="images">
        <span class="radio-label__text">Images</span>
      </label>
      <label class="radio-label">
        <input type="radio" class="radio-button" name="group-demo" value="videos">
        <span class="radio-label__text">Videos</span>
      </label>
      <label class="radio-label">
        <input type="radio" class="radio-button" name="group-demo" value="news">
        <span class="radio-label__text">News</span>
      </label>
    </fieldset>

  </div>

  <script>
    // ─── Theme toggle ────────────────────────────────────────────────────────
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon   = document.getElementById('themeIcon');
    const label  = document.getElementById('themeLabel');

    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);

    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      label.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }

    /* ── Iframe embed: theme sync + auto-sizing ── */
    (function () {
      if (window === window.parent) return;
      document.querySelector('.theme-toggle')?.remove();
      window.addEventListener('message', ({ data }) => {
        if (data?.type === 'setTheme') document.documentElement.dataset.theme = data.theme;
      });
      const report = () => window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
      new ResizeObserver(report).observe(document.documentElement);
      report();
    }());
  </script>

</body>
</html>
