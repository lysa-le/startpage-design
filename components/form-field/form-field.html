<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>form-field — Component Demo</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>

    /* ─────────────────────────────────────────────
       DARK MODE TOKEN OVERRIDES
       ───────────────────────────────────────────── */
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);

      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);

      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-200);
      --color-icon-tertiary:  var(--color-midnight-100);

      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-secondary:      var(--color-black-550);
      --color-stroke-primary-button: var(--color-brand-blue-200);
      --color-stroke-error:          var(--color-red-400);

      --color-text-error: var(--color-red-400);
    }

    /* ─────────────────────────────────────────────
       THEME TOGGLE
       ───────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 100;
    }
    .theme-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }

    /* ─────────────────────────────────────────────
       RESET & PAGE
       ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-background-quaternary);
      color: var(--color-text-primary);
      padding: var(--spacing-48);
      min-height: 100vh;
    }

    h1 {
      font-size: var(--font-heading-xs);
      line-height: var(--font-heading-xs-lh);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-8);
    }

    .page-subtitle {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-48);
    }

    .demo-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-48);
      align-items: flex-start;
    }

    .demo-group {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-16);
    }

    .demo-group__title {
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .demo-item {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-8);
    }

    .demo-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      color: var(--color-text-tertiary);
      white-space: nowrap;
      padding-left: var(--spacing-12);
    }

    /* ─────────────────────────────────────────────
       FORM-FIELD — BASE
       ───────────────────────────────────────────── */
    .form-field {
      display: flex;
      flex-direction: column;
      width: 300px;
      background: var(--color-background-primary);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      border-radius: var(--radius-lg);
      padding: var(--spacing-8) var(--spacing-12);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .form-field:focus-within {
      border-color: var(--color-stroke-primary-button);
    }

    /* ─────────────────────────────────────────────
       FORM-FIELD — INPUT / TEXTAREA
       ───────────────────────────────────────────── */
    .form-field__input {
      width: 100%;
      background: none;
      border: none;
      outline: none;
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      resize: none;
    }

    .form-field__input::placeholder {
      color: var(--color-text-secondary);
      opacity: 0.6;
    }

    /* ─────────────────────────────────────────────
       FORM-FIELD — MULTI-LINE
       ───────────────────────────────────────────── */
    .form-field--multiline {
      min-height: 64px;
    }

    .form-field--multiline .form-field__input {
      flex: 1;
      resize: vertical;
      min-height: 0;
    }

    /* ─────────────────────────────────────────────
       FORM-FIELD — ERROR
       ───────────────────────────────────────────── */
    .form-field--error {
      border-color: var(--color-stroke-error);
    }

    .form-field--error:focus-within {
      border-color: var(--color-stroke-error);
    }

    .form-field__error {
      display: block;
      margin-top: calc(-1 * var(--spacing-4));
      padding-left: var(--spacing-12);
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      color: var(--color-text-error);
    }

  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>

  <h1>form-field</h1>
  <p class="page-subtitle">4 variants — default · active (focused) · error · multi-line</p>

  <div class="demo-grid">

    <!-- ── Default ── -->
    <div class="demo-group">
      <p class="demo-group__title">Default</p>
      <div class="demo-item">
        <div class="form-field">
          <input class="form-field__input" type="text" placeholder="text entry">
        </div>
        <span class="demo-label">default</span>
      </div>
    </div>
  
    <!-- ── Active / Focused ── -->
    <div class="demo-group">
      <p class="demo-group__title">Active</p>
      <div class="demo-item">
        <div class="form-field" id="activeDemo">
          <input class="form-field__input" type="text" placeholder="text entry" id="activeInput">
        </div>
        <span class="demo-label">active (click to focus)</span>
      </div>
    </div>
  
    <!-- ── Error ── -->
    <div class="demo-group">
      <p class="demo-group__title">Error</p>
      <div class="demo-item">
        <div class="form-field form-field--error">
          <input class="form-field__input" type="text" value="xyz">
        </div>
        <span class="form-field__error">Error message</span>
      </div>
    </div>
  
  </div>
  
  <div class="demo-grid" style="margin-top: var(--spacing-48);">
  
    <!-- ── Multi-line ── -->
    <div class="demo-group">
      <p class="demo-group__title">Multi-line</p>
      <div class="demo-item">
        <div class="form-field form-field--multiline">
          <textarea class="form-field__input" placeholder="text entry"></textarea>
        </div>
      </div>
    </div>
  
    <!-- ── Multi-line Error ── -->
    <div class="demo-group">
      <p class="demo-group__title">Multi-line Error</p>
      <div class="demo-item">
        <div class="form-field form-field--multiline form-field--error">
          <textarea class="form-field__input">text entry</textarea>
        </div>
        <span class="form-field__error">Error message</span>
      </div>
    </div>
  
  </div>

  <script>
    // ─── Theme toggle ────────────────────────────────────────────────────────
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon   = document.getElementById('themeIcon');
    const label  = document.getElementById('themeLabel');

    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);

    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      label.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }

    // ─── Auto-focus the active demo on load ─────────────────────────────────
    document.getElementById('activeInput').focus();

    /* ── Iframe embed: theme sync + auto-sizing ── */
    (function () {
      if (window === window.parent) return;
      document.querySelector('.theme-toggle')?.remove();
      window.addEventListener('message', ({ data }) => {
        if (data?.type === 'setTheme') document.documentElement.dataset.theme = data.theme;
      });
      const report = () => window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
      new ResizeObserver(report).observe(document.documentElement);
      report();
    }());
  </script>


</body>
</html>
