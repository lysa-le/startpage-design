<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Header — Component Demo</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>

    /* ─────────────────────────────────────────────
       DARK MODE TOKEN OVERRIDES
       ───────────────────────────────────────────── */
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);

      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);
      --color-text-inverted:  var(--color-black-800);
      --color-text-brandblue: var(--color-brand-blue-200);
      --color-text-link:      var(--color-brand-blue-200);

      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-200);
      --color-icon-tertiary:  var(--color-midnight-100);

      --color-button-inactive: var(--color-black-600);

      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-secondary:      var(--color-black-550);
      --color-stroke-primary-button: var(--color-brand-blue-200);
    }

    /* ─────────────────────────────────────────────
       THEME TOGGLE
       ───────────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 200;
    }
    .theme-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }
    .theme-toggle:focus-visible {
      outline: var(--border-stroke-lg) solid var(--color-stroke-primary-button);
      outline-offset: 3px;
    }

    /* ─────────────────────────────────────────────
       RESET & PAGE
       ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-background-quaternary);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    .page-header {
      padding: var(--spacing-48) var(--spacing-48) var(--spacing-32);
    }

    .page-header h1 {
      font-size: var(--font-heading-xs);
      line-height: var(--font-heading-xs-lh);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-8);
    }

    .page-header p {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      color: var(--color-text-secondary);
    }

    .demo-section {
      margin-bottom: var(--spacing-64);
    }

    .demo-section__label {
      padding: 0 var(--spacing-48) var(--spacing-12);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* Full-bleed preview strip */
    .demo-preview {
      background: var(--color-background-secondary);
      padding: var(--spacing-32) var(--spacing-48);
      overflow-x: auto;
    }

    .demo-preview--fullwidth {
      padding: 0; /* headers are full-bleed */
    }

    /* Mobile previews sit side by side */
    .demo-mobile-row {
      display: flex;
      gap: var(--spacing-48);
      flex-wrap: wrap;
      padding: var(--spacing-48);
    }

    .demo-mobile-item {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
    }

    .demo-mobile-item .demo-section__label {
      padding: 0;
    }

    /* Mobile preview frame */
    .demo-mobile-frame {
      width: 414px;
      overflow: hidden;
      box-shadow: var(--shadow-card);
    }

    /* ─────────────────────────────────────────────
       SEARCH FIELD (embedded — mirrors search-field component)
       ───────────────────────────────────────────── */
    .search-field {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      background: var(--color-background-primary);
      border: var(--border-stroke-sm) solid var(--color-stroke-secondary);
      border-radius: var(--radius-full);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }

    .search-field:focus-within { border-color: var(--color-stroke-primary-button); }

    .search-field--serp { height: 40px; }

    .search-field--serp.search-field--mobile {
      box-shadow: var(--shadow-search);
    }

    .search-field__input {
      flex: 1;
      min-width: 0;
      height: 100%;
      padding: 0 0 0 var(--spacing-16);
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-family);
      font-size: var(--font-body-md);
      line-height: var(--font-body-md-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      caret-color: var(--color-text-tertiary);
    }

    .search-field__input::placeholder { color: var(--color-text-secondary); }

    .search-field__actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      padding-right: var(--spacing-20);
      flex-shrink: 0;
    }

    .search-field__clear {
      display: none;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-tertiary);
      flex-shrink: 0;
      transition: color 100ms ease;
    }
    .search-field__clear:hover { color: var(--color-icon-primary); }
    .search-field.has-value .search-field__clear { display: flex; }
    .search-field--serp .search-field__clear { display: flex; }

    .search-field__divider {
      display: none;
      width: 1px;
      height: 16px;
      background: var(--color-stroke-primary);
      flex-shrink: 0;
    }
    .search-field.has-value .search-field__divider { display: block; }
    .search-field--serp .search-field__divider { display: block; }

    .search-field__submit {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-secondary);
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }
    .search-field__submit:hover { opacity: 0.75; }

    /* ─────────────────────────────────────────────
       SITE HEADER — BASE
       ───────────────────────────────────────────── */
    .site-header {
      position: relative;
      width: 100%;
      background: var(--color-background-primary);
      font-family: var(--font-family);
    }

    /* ─────────────────────────────────────────────
       SITE HEADER — SHARED SUB-COMPONENTS
       ───────────────────────────────────────────── */

    /* Logo */
    .site-header__logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }

    .site-header__logo-svg {
      display: block;
      width: 104px;
      height: auto;
      /* text path uses currentColor — inherits from parent color token */
      color: var(--color-text-primary);
    }

    .site-header--mobile-full .site-header__logo-svg {
      width: 90px;
    }

    /* Hamburger */
    .site-header__hamburger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-primary);
      flex-shrink: 0;
    }

    /* Tabs */
    .site-header__tabs {
      display: flex;
      align-items: center;
    }

    .site-header__tab {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      white-space: nowrap;
    }

    /* Reserve bold width so switching active tab never shifts layout */
    .site-header__tab::after {
      content: attr(data-text);
      display: block;
      font-weight: var(--font-weight-semibold);
      height: 0;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }

    .site-header__tab--active {
      font-weight: var(--font-weight-semibold);
      color: var(--color-text-brandblue);
    }

    .site-header__tab:hover:not(.site-header__tab--active) {
      color: var(--color-text-brandblue);
    }

    /* Active tab indicator — left + width set by JS */
    .site-header__tab-indicator {
      position: absolute;
      bottom: 0;
      height: 3px;
      background: var(--color-text-brandblue);
      border-radius: var(--radius-full);
      pointer-events: none;
      transition: left 200ms ease, width 200ms ease;
    }

    /* ─────────────────────────────────────────────
       SITE HEADER — DESKTOP
       ───────────────────────────────────────────── */
    .site-header--desktop {
      border-bottom: var(--border-stroke-sm) solid var(--color-stroke-secondary);
    }

    /* Top row: 67px */
    .site-header--desktop .site-header__top {
      display: flex;
      align-items: center;
      height: 67px;
      padding: 0 var(--spacing-40) 0 var(--spacing-24);
      gap: var(--spacing-24);
    }

    /* Search: 628px fixed, context override adds shadow */
    .site-header--desktop .site-header__search-wrap {
      width: 628px;
      flex-shrink: 0;
    }

    .site-header--desktop .search-field--serp {
      box-shadow: var(--shadow-search); /* context override — header provides shadow */
    }

    /* Right nav: PP dropdown + hamburger */
    .site-header__right {
      display: flex;
      align-items: center;
      gap: var(--spacing-40);
      margin-left: auto;
      flex-shrink: 0;
    }

    /* icn-arrows used inside PP button */
    .icn-arrows {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-icon-primary);
    }
    .icn-arrows--down-circle {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-full);
      background: var(--color-button-inactive);
    }

    .site-header__pp-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      white-space: nowrap;
      transition: color 150ms ease;
    }

    .site-header__pp-btn:hover { color: var(--color-text-brandblue); }

    /* Bottom nav row: 36px
       3-col grid mirrors the top row so tabs align with the search bar's
       left edge and the filter aligns with its right edge.
       col 1 = logo area spacer (24px pad + 104px logo + 24px gap = 152px)
       col 2 = search bar width (628px)
       col 3 = remainder (right side of page) */
    .site-header--desktop .site-header__nav {
      display: grid;
      grid-template-columns: calc(var(--spacing-24) + 104px + var(--spacing-24)) 628px 1fr;
      height: 36px;
      align-items: center;
    }

    .site-header--desktop .site-header__tabs {
      grid-column: 2;
      grid-row: 1;
      gap: var(--spacing-24);
    }

    /* Filter button */
    .site-header__filter-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-primary);
      flex-shrink: 0;
    }

    /* Desktop: place filter in col 2, row 1 — x-aligned with search submit icon */
    .site-header--desktop .site-header__filter-btn {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      margin-right: var(--spacing-20);
    }

    .site-header__filter-btn:hover { opacity: 0.7; }

    /* ─────────────────────────────────────────────
       SITE HEADER — MOBILE (search + tabs only)
       ───────────────────────────────────────────── */
    .site-header--mobile {
      border-bottom: var(--border-stroke-sm) solid var(--color-stroke-primary);
    }

    .site-header--mobile .site-header__search-wrap {
      padding: var(--spacing-16) var(--spacing-16) 0;
    }

    .site-header--mobile .site-header__tabs {
      gap: var(--spacing-32);
      justify-content: center;
      padding: var(--spacing-12) var(--spacing-16);
    }

    /* ─────────────────────────────────────────────
       SITE HEADER — MOBILE FULL (logo + hamburger + search + tabs)
       ───────────────────────────────────────────── */
    .site-header--mobile-full {
      border-bottom: var(--border-stroke-sm) solid var(--color-stroke-primary);
    }

    /* Top row: logo centred, hamburger pinned right */
    .site-header__mobile-top {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      padding: var(--spacing-20) var(--spacing-16);
    }

    .site-header--mobile-full .site-header__hamburger-btn {
      position: absolute;
      right: var(--spacing-16);
    }

    .site-header--mobile-full .site-header__search-wrap {
      padding: 0 var(--spacing-16);
    }

    .site-header--mobile-full .site-header__tabs {
      gap: var(--spacing-32);
      justify-content: center;
      padding: var(--spacing-12) var(--spacing-16) var(--spacing-8);
    }

  </style>
</head>

      <path d="M6.75 0.75L6.75 3.25"     stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M12.75 7L5.25 7"          stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2.75 7H0.75"             stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>

    </symbol>
  </svg>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>

  <div class="page-header">
    <h1>Header</h1>
    <p>Desktop · Mobile (search + tabs) · Mobile Full (logo + hamburger + search + tabs)</p>
  </div>

  <!-- ──────────────────────────────────────────
       DESKTOP
       ────────────────────────────────────────── -->
  <div class="demo-section">
    <p class="demo-section__label">Desktop</p>
    <div class="demo-preview demo-preview--fullwidth">

      <header class="site-header site-header--desktop" id="header-desktop">

        <!-- Top row -->
        <div class="site-header__top">

  <script>
    // ─── Theme toggle ───────────────────────────────────────────────────────
    const html    = document.documentElement;
    const toggle  = document.getElementById('themeToggle');
    const icon    = document.getElementById('themeIcon');
    const label   = document.getElementById('themeLabel');

    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);

    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      label.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }

    // ─── Tab switching + indicator ──────────────────────────────────────────
    function initHeader(header) {
      const tabs      = header.querySelectorAll('.site-header__tab');
      const indicator = header.querySelector('.site-header__tab-indicator');

      function positionIndicator(activeTab) {
        if (!indicator || !activeTab) return;
        const headerRect = header.getBoundingClientRect();
        const tabRect    = activeTab.getBoundingClientRect();
        indicator.style.left  = (tabRect.left - headerRect.left) + 'px';
        indicator.style.width = tabRect.width + 'px';
      }

      tabs.forEach(function(tab) {
        tab.addEventListener('click', function() {
          tabs.forEach(function(t) { t.classList.remove('site-header__tab--active'); });
          tab.classList.add('site-header__tab--active');
          positionIndicator(tab);
        });
      });

      // Initial position on load
      const activeTab = header.querySelector('.site-header__tab--active');
      // Defer until layout is complete
      requestAnimationFrame(function() { positionIndicator(activeTab); });
    }

    document.querySelectorAll('.site-header').forEach(initHeader);

    // Re-position indicators on resize (indicator uses pixel left/width)
    window.addEventListener('resize', function() {
      document.querySelectorAll('.site-header').forEach(function(header) {
        const activeTab = header.querySelector('.site-header__tab--active');
        const indicator = header.querySelector('.site-header__tab-indicator');
        if (!indicator || !activeTab) return;
        const headerRect = header.getBoundingClientRect();
        const tabRect    = activeTab.getBoundingClientRect();
        indicator.style.left  = (tabRect.left - headerRect.left) + 'px';
        indicator.style.width = tabRect.width + 'px';
      });
    });

    // ─── Search field: has-value management ────────────────────────────────
    document.querySelectorAll('.search-field__input').forEach(function(input) {
      var field = input.closest('.search-field');

      function syncHasValue() {
        field.classList.toggle('has-value', input.value.length > 0);
      }

      input.addEventListener('input', syncHasValue);
      syncHasValue();
    });

    // ─── Search field: clear button ────────────────────────────────────────
    document.querySelectorAll('.search-field__clear').forEach(function(btn) {
      btn.addEventListener('click', function() {
        var field = btn.closest('.search-field');
        var input = field.querySelector('.search-field__input');
        input.value = '';
        field.classList.remove('has-value');
        input.focus();
      });
    });

    /* ── Iframe embed: theme sync + auto-sizing ── */
    (function () {
      if (window === window.parent) return;
      document.querySelector('.theme-toggle')?.remove();
      window.addEventListener('message', ({ data }) => {
        if (data?.type === 'setTheme') document.documentElement.dataset.theme = data.theme;
      });
      const report = () => window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
      new ResizeObserver(report).observe(document.documentElement);
      report();
    }());
  </script>
