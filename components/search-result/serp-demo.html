<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERP Demo — Startpage Design System</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    /* ─────────────────────────────────────────────
       Dark mode token overrides
       ───────────────────────────────────────────── */
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);

      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);
      --color-text-inverted:  var(--color-black-800);
      --color-text-brandblue: var(--color-brand-blue-100);
      --color-text-link:      var(--color-brand-blue-100);

      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-100);
      --color-icon-tertiary:  var(--color-midnight-100);

      --color-button-brandblue:          var(--color-brand-blue-100);
      --color-button-brandbluehover:     var(--color-brand-blue-300);
      --color-button-productfilled:      var(--color-black-550);
      --color-button-productfilledhover: var(--color-black-400);
      --color-button-inactive:           var(--color-black-600);

      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-secondary:      var(--color-black-550);
      --color-stroke-primary-button: var(--color-brand-blue-100);

      --color-accent-gold:     var(--color-gold-200);
      --color-accent-gold-alt: var(--color-gold-500);
      --color-button-social:   var(--color-brand-blue-100);
    }

    [data-theme="dark"] .footer__social-icon [fill="white"] {
      fill: var(--color-black-900);
    }

    [data-theme="dark"] .footer__social-icon [stroke="white"] {
      stroke: var(--color-black-900);
    }

    /* ─────────────────────────────────────────────
       Page scaffold
       ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-family);
      transition: background-color 0.2s ease, color 0.2s ease;
      min-height: 100vh;
    }

    /* ── Search field (embedded) ── */
    .search-field {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      background: var(--color-background-primary);
      border: var(--border-stroke-sm) solid var(--color-stroke-secondary);
      border-radius: var(--radius-full);
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    .search-field:focus-within { border-color: var(--color-stroke-primary-button); }
    .search-field--serp { height: 40px; }
    .search-field__input {
      flex: 1;
      min-width: 0;
      height: 100%;
      padding: 0 0 0 var(--spacing-16);
      background: transparent;
      border: none;
      outline: none;
      font-family: var(--font-family);
      font-size: var(--font-body-md);
      line-height: var(--font-body-md-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      caret-color: var(--color-text-tertiary);
    }
    .search-field__input::placeholder { color: var(--color-text-secondary); opacity: 0.6; }
    .search-field__actions {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      padding-right: var(--spacing-20);
      flex-shrink: 0;
    }
    .search-field__clear {
      display: none;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-tertiary);
      flex-shrink: 0;
      transition: color 100ms ease;
    }
    .search-field__clear:hover { color: var(--color-icon-primary); }
    .search-field.has-value .search-field__clear { display: flex; }
    .search-field--serp .search-field__clear { display: flex; }
    .search-field__divider {
      display: none;
      width: 1px;
      height: 16px;
      background: var(--color-stroke-primary);
      flex-shrink: 0;
    }
    .search-field.has-value .search-field__divider { display: block; }
    .search-field--serp .search-field__divider { display: block; }
    .search-field__submit {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-secondary);
      flex-shrink: 0;
      transition: opacity 100ms ease;
    }
    .search-field__submit:hover { opacity: 0.75; }

    /* ── Site header — desktop ── */
    .site-header {
      position: relative;
      width: 100%;
      background: var(--color-background-primary);
      font-family: var(--font-family);
    }
    .site-header__logo {
      display: inline-flex;
      align-items: center;
      text-decoration: none;
      flex-shrink: 0;
    }
    .site-header__logo-svg {
      display: block;
      width: 104px;
      height: auto;
      color: var(--color-text-primary);
    }
    .site-header__hamburger-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-primary);
      flex-shrink: 0;
    }
    .site-header__tabs {
      display: flex;
      align-items: center;
    }
    .site-header__tab {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }
    .site-header__tab::after {
      content: attr(data-text);
      display: block;
      font-weight: var(--font-weight-semibold);
      height: 0;
      overflow: hidden;
      visibility: hidden;
      pointer-events: none;
    }
    .site-header__tab--active {
      font-weight: var(--font-weight-medium);
      color: var(--color-text-brandblue);
    }
    .site-header__tab:hover:not(.site-header__tab--active) { color: var(--color-text-brandblue); }
    [data-theme="dark"] .site-header__tab:hover:not(.site-header__tab--active) { color: var(--color-button-brandblue); }
    .site-header__tab-indicator {
      position: absolute;
      bottom: 0;
      height: 3px;
      background: var(--color-text-brandblue);
      border-radius: var(--radius-full);
      pointer-events: none;
      transition: left 200ms ease, width 200ms ease;
    }
    .site-header--desktop {
      display: grid;
      grid-template-columns:
        var(--spacing-24)
        104px
        var(--spacing-24)
        1fr
        var(--spacing-24)
        auto
        var(--spacing-40);
      grid-template-rows: 67px 36px;
      border-bottom: var(--border-stroke-sm) solid var(--color-stroke-secondary);
    }
    .site-header--desktop .site-header__top {
      grid-column: 1 / -1;
      grid-row: 1;
      display: grid;
      grid-template-columns: subgrid;
      align-items: center;
    }
    .site-header--desktop .site-header__top .site-header__logo { grid-column: 2; }
    .site-header--desktop .site-header__right { grid-column: 6; }
    .site-header--desktop .site-header__search-wrap {
      grid-column: 4;
      max-width: 628px;
      min-width: 0;
    }
    .site-header--desktop .search-field--serp { box-shadow: var(--shadow-search); }
    .site-header__right {
      display: flex;
      align-items: center;
      gap: var(--spacing-40);
    }
    .icn-arrows {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: var(--color-icon-primary);
    }
    .icn-arrows--down-circle {
      width: 16px;
      height: 16px;
      border-radius: var(--radius-full);
      background: var(--color-button-inactive);
    }
    .site-header__pp-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      white-space: nowrap;
      transition: color 150ms ease;
    }
    .site-header__pp-btn:hover { color: var(--color-text-brandblue); }
    [data-theme="dark"] .site-header__pp-btn:hover { color: var(--color-button-brandblue); }
    .site-header--desktop .site-header__nav {
      grid-column: 1 / -1;
      grid-row: 2;
      display: grid;
      grid-template-columns: subgrid;
      align-items: stretch;
    }
    .site-header--desktop .site-header__nav .site-header__tabs-row {
      grid-column: 4;
      display: flex;
      align-items: stretch;
      max-width: 628px;
    }
    .site-header__tabs-scroll {
      position: relative;
      flex: 1 1 auto;
      min-width: 0;
      overflow: hidden;
    }
    .site-header__tabs-scroll .site-header__tabs {
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      flex-wrap: nowrap;
    }
    .site-header__tabs-scroll .site-header__tabs::-webkit-scrollbar {
      display: none;
    }
    .site-header__tabs-scroll::after {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 48px;
      height: 100%;
      background: linear-gradient(to right, transparent, var(--color-background-primary));
      pointer-events: none;
    }
    .site-header--desktop .site-header__tabs {
      height: 100%;
      gap: var(--spacing-24);
      padding-left: var(--spacing-16);
    }
    .site-header__filter-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-icon-primary);
      flex-shrink: 0;
      transition: color 150ms ease;
    }
    .site-header--desktop .site-header__nav .site-header__filter-btn { padding-right: var(--spacing-20); }
    .site-header__filter-btn:hover { color: var(--color-icon-secondary); }
    [data-theme="dark"] .site-header__filter-btn:hover { color: var(--color-button-brandblue); }

    /* ── Results body ── */
    .serp-body {
      padding: var(--spacing-32) var(--spacing-48) var(--spacing-48)
        calc(var(--spacing-24) + 104px + var(--spacing-24));
    }

    .serp-meta {
      font-size: var(--font-body-xs);
      color: var(--color-text-tertiary);
      margin-bottom: var(--spacing-24);
      min-height: 18px;
    }

    /* ── Results list ── */
    .results-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-32);
      max-width: 598px;
    }

    /* ── Result entry animation ── */
    .algo-result, .ad-result {
      animation: fadeIn 0.15s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ── */
    .serp-empty {
      max-width: 598px;
      padding: var(--spacing-48) 0;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
    }

    .serp-empty__title {
      font-size: var(--font-body-lg);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .serp-empty__sub {
      font-size: var(--font-body-sm);
      color: var(--color-text-secondary);
    }

    /* ── Match highlight ── */
    mark {
      background: none;
      color: inherit;
      font-weight: var(--font-weight-semibold);
    }

    /* ─────────────────────────────────────────────
       Organic result — algo-result
       ───────────────────────────────────────────── */
    .algo-result {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
      width: 100%;
    }

    .algo-result__source {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .algo-result__favicon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .algo-result__source-info {
      display: flex;
      flex-direction: column;
      line-height: var(--font-body-sm-lh);
    }

    .algo-result__site-name {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .algo-result__url {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
    }

    .algo-result__content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }

    .algo-result__title {
      font-size: var(--font-body-lg);
      line-height: var(--font-body-lg-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
      display: block;
    }

    .algo-result__title:hover { text-decoration: underline; }

    .algo-result__description {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .algo-result__av-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .algo-result__av-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--color-icon-secondary);
    }

    .algo-result__av-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
    }

    .algo-result__av-label:hover { text-decoration: underline; }

    /* ─────────────────────────────────────────────
       Ad result — ad-result
       ───────────────────────────────────────────── */
    .ad-result {
      --ad-gap: 10px;
      display: flex;
      flex-direction: column;
      gap: var(--ad-gap);
      width: 100%;
    }

    .ad-result__sponsored {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-secondary);
    }

    .ad-result__source {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .ad-result__favicon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .ad-result__source-meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-16);
    }

    .ad-result__source-info {
      display: flex;
      flex-direction: column;
      line-height: var(--font-body-sm-lh);
    }

    .ad-result__site-name {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .ad-result__url {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
    }

    .ad-result__dots-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: var(--spacing-4);
      cursor: pointer;
      color: var(--color-text-tertiary);
      border-radius: var(--radius-sm);
      transition: color 0.15s ease, background-color 0.15s ease;
      flex-shrink: 0;
    }

    .ad-result__dots-btn:hover {
      color: var(--color-text-secondary);
      background-color: var(--color-background-secondary);
    }

    .ad-result__body {
      display: flex;
      align-items: flex-start;
      gap: 19px;
    }

    .ad-result__text {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
      flex: 1;
      min-width: 0;
    }

    .ad-result__title {
      font-size: var(--font-body-lg);
      line-height: var(--font-body-lg-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
      display: block;
    }

    .ad-result__title:hover { text-decoration: underline; }

    .ad-result__description {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .ad-result__image {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-lg);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .ad-result__rating {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .ad-result__stars { display: flex; align-items: center; }

    .star { width: 16px; height: 16px; flex-shrink: 0; }
    .star--filled { color: var(--color-accent-gold); }
    .star--empty  { color: var(--color-stroke-primary); }

    .ad-result__rating-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }

    .ad-result__sitelinks {
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
      flex-wrap: wrap;
    }

    .ad-result__sitelink {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
    }

    .ad-result__sitelink:hover { text-decoration: underline; }

    .ad-result__sitelink-sep {
      color: var(--color-text-tertiary);
      line-height: var(--font-body-sm-lh);
      user-select: none;
    }

    /* ── Pagination ── */
    .serp-pagination {
      margin-top: var(--spacing-48);
      max-width: 598px;
    }
    .pagination {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }
    .btn-ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
      transform: scale(0);
      animation: ripple 550ms ease-out forwards;
      pointer-events: none;
      z-index: 2;
    }
    @keyframes ripple { to { transform: scale(5); opacity: 0; } }
    .pagination__page {
      width: calc(var(--spacing-12) * 2 + var(--font-button-xs-lh));
      height: calc(var(--spacing-12) * 2 + var(--font-button-xs-lh));
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      isolation: isolate;
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: transparent;
      color: var(--color-text-primary);
      font-family: var(--font-family);
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background-color 0.15s ease, border-color 0.15s ease;
    }
    .pagination__page:hover {
      background-color: var(--color-button-productfilled);
      border-color: var(--color-button-productfilled);
    }
    .pagination__page[aria-current="page"] {
      background-color: var(--color-button-brandblue);
      border-color: var(--color-button-brandblue);
      color: var(--color-text-inverted);
      font-weight: var(--font-weight-bold);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .pagination__page[aria-current="page"]:hover {
      background-color: var(--color-button-brandbluehover);
      border-color: var(--color-button-brandbluehover);
    }
    .pagination__nav {
      position: relative;
      overflow: hidden;
      isolation: isolate;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-12) var(--spacing-16);
      border-radius: var(--radius-lg);
      border: none;
      background-color: var(--color-button-productfilled);
      color: var(--color-text-primary);
      font-family: var(--font-family);
      font-size: var(--font-button-xs);
      line-height: var(--font-button-xs-lh);
      font-weight: var(--font-weight-regular);
      cursor: pointer;
      transition: background-color 0.15s ease;
      white-space: nowrap;
    }
    .pagination__nav:hover { background-color: var(--color-button-productfilledhover); }
    .pagination__page:focus-visible,
    .pagination__nav:focus-visible {
      outline: var(--border-stroke-lg) solid var(--color-stroke-primary-button);
      outline-offset: 3px;
    }

    /* ── Footer ── */
    .footer {
      position: relative;
      width: 100%;
    }
    .footer__wave { display: block; width: 100%; }
    .footer__body { background: var(--color-black-800); }
    .footer__logo {
      display: block;
      flex: none;
      text-decoration: none;
    }
    .footer__logo svg {
      display: block;
      color: var(--color-whisper-100);
    }
    .footer__links {
      display: flex;
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .footer__link {
      color: var(--color-whisper-100);
      text-decoration: none;
      font-family: var(--font-family);
      font-weight: var(--font-weight-regular);
      transition: color 150ms ease;
    }
    .footer__link:hover { color: var(--color-brand-blue-100); }
    [data-theme="dark"] .footer__link:hover { color: var(--color-button-brandblue); }
    .footer__social {
      display: flex;
      align-items: center;
    }
    .footer__social-icon {
      display: block;
      flex: none;
      cursor: pointer;
    }
    .social-bg {
      fill: var(--color-button-social);
      transition: fill 150ms ease;
    }

    function slug(str) {

    /* Deterministic pick — same query always returns the same item */
    function hash(str) {

    /* ─────────────────────────────────────────────
       Highlight — bolds matched words in descriptions
       ───────────────────────────────────────────── */
    function highlight(text, query) {
      if (!query.trim()) return text;
      const words = query.trim().split(/\s+/).filter(Boolean);
      const pattern = new RegExp(`(${words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
      return text.replace(pattern, '<mark>$1</mark>');
    }

    function renderStars(count) {
      let html = '';
      for (let i = 0; i < 5; i++) {
        html += i < count
          ? `<svg class="star star--filled" aria-hidden="true"><use href="#icon-star-filled"/></svg>`
          : `<svg class="star star--empty"  aria-hidden="true"><use href="#icon-star-empty"/></svg>`;
      }
      return html;
    }

    function renderSitelinks(links, query) {
      return links.map((link, i) => {
        const sep = i < links.length - 1
          ? `<span class="ad-result__sitelink-sep" aria-hidden="true">·</span>`
          : '';
        return `<a class="ad-result__sitelink" href="#">${highlight(link, query)}</a>${sep}`;
      }).join('');
    }

    function renderAd(data, query) {
      const imageHtml = data.hasImage
        ? `<div class="ad-result__image" aria-hidden="true"></div>`
        : '';

      const ratingHtml = data.stars != null ? `
        <div class="ad-result__rating" aria-label="${data.stars} out of 5 stars — ${data.ratingLabel}">
          <div class="ad-result__stars" aria-hidden="true">${renderStars(data.stars)}</div>
          <span class="ad-result__rating-label">${data.ratingLabel}</span>
        </div>` : '';

      const sitelinksHtml = data.sitelinks?.length
        ? `<div class="ad-result__sitelinks">${renderSitelinks(data.sitelinks, query)}</div>`
        : '';

      return `
        <div class="ad-result">
          <span class="ad-result__sponsored">Sponsored</span>
          <div class="ad-result__source">
            <div class="ad-result__favicon" aria-hidden="true"></div>
            <div class="ad-result__source-meta">
              <div class="ad-result__source-info">
                <span class="ad-result__site-name">${highlight(data.siteName, query)}</span>
                <span class="ad-result__url">${data.url}</span>
              </div>
              <button class="ad-result__dots-btn" aria-label="About this ad">
                <svg width="4" height="16" aria-hidden="true"><use href="#icon-dots-vertical"/></svg>

              <p class="ad-result__description">${highlight(data.description, query)}</p>
            </div>
            ${imageHtml}
          </div>
          ${ratingHtml}
          ${sitelinksHtml}
        </div>`;
    }

      const adCount = topAds.length + bottomAds.length;
      meta.textContent = `About ${approx} results — ${adCount} sponsored, ${organic.length} organic`;

      const blocks = [
        ...topAds.map(item => renderAd(item, value)),
        ...organic.map(item => renderOrganic(item, value)),
        ...bottomAds.map(item => renderAd(item, value)),
      ];

      list.innerHTML = blocks.join('');
    }

    /* ─────────────────────────────────────────────
       Input wiring
       ───────────────────────────────────────────── */
    const input = document.getElementById('searchInput');
    let debounce;

    input.addEventListener('input', () => {
      input.closest('.search-field')?.classList.toggle('has-value', input.value.length > 0);
      clearTimeout(debounce);
      debounce = setTimeout(() => render(input.value), 180);
    });

    document.querySelectorAll('.search-field__clear').forEach(btn => {
      btn.addEventListener('click', () => {
        const field = btn.closest('.search-field');
        const fieldInput = field?.querySelector('.search-field__input');
        if (!fieldInput) return;
        fieldInput.value = '';
        field?.classList.remove('has-value');
        fieldInput.focus();
        if (fieldInput.id === 'searchInput') render('');
      });
    });

    /* Initial render */
    render(input.value);

    function initHeader(header) {
      const tabs = header.querySelectorAll('.site-header__tab');
      const indicator = header.querySelector('.site-header__tab-indicator');

      function positionIndicator() {
        if (!indicator) return;
        const activeTab = Array.from(header.querySelectorAll('.site-header__tab--active'))
          .find(tab => tab.offsetWidth > 0);
        if (!activeTab) return;
        const headerRect = header.getBoundingClientRect();
        const tabRect = activeTab.getBoundingClientRect();
        indicator.style.left = `${tabRect.left - headerRect.left}px`;
        indicator.style.width = `${tabRect.width}px`;
      }

      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          const clickedText = tab.dataset.text;
          tabs.forEach(t => t.classList.toggle('site-header__tab--active', t.dataset.text === clickedText));
          positionIndicator();
          tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'nearest' });
        });
      });

      requestAnimationFrame(positionIndicator);
    }

    document.querySelectorAll('.site-header').forEach(initHeader);
    window.addEventListener('resize', () => {
      document.querySelectorAll('.site-header').forEach(header => {
        const indicator = header.querySelector('.site-header__tab-indicator');
        if (!indicator) return;
        const activeTab = Array.from(header.querySelectorAll('.site-header__tab--active'))
          .find(tab => tab.offsetWidth > 0);
        if (!activeTab) return;
        const headerRect = header.getBoundingClientRect();
        const tabRect = activeTab.getBoundingClientRect();
        indicator.style.left = `${tabRect.left - headerRect.left}px`;
        indicator.style.width = `${tabRect.width}px`;
      });
    });

    document.querySelectorAll('.pagination__page').forEach(btn => {
      btn.addEventListener('click', () => {
        const nav = btn.closest('.pagination');
        nav.querySelectorAll('.pagination__page').forEach(page => page.removeAttribute('aria-current'));
        btn.setAttribute('aria-current', 'page');
      });
    });

    document.querySelectorAll('[data-btn]').forEach(btn => {
      btn.addEventListener('mousedown', event => {
        if (btn.disabled) return;
        const rect = btn.getBoundingClientRect();
        const size = Math.max(rect.width, rect.height) * 2.2;
        const ripple = document.createElement('span');
        ripple.className = 'btn-ripple';
        Object.assign(ripple.style, {
          width: `${size}px`,
          height: `${size}px`,
          left: `${event.clientX - rect.left - size / 2}px`,
          top: `${event.clientY - rect.top - size / 2}px`,
        });
        btn.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove(), { once: true });
      });
    });

    /* ─────────────────────────────────────────────
       Theme toggle
       ───────────────────────────────────────────── */
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon   = document.getElementById('themeIcon');
    const label  = document.getElementById('themeLabel');

    applyTheme(localStorage.getItem('theme') || 'light');
    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent   = theme === 'dark' ? '🌙' : '☀️';
      label.textContent  = theme === 'dark' ? 'Dark'  : 'Light';
    }

    /* ── Iframe embed: theme sync + auto-sizing ── */
    (function () {
      if (window === window.parent) return;
      document.querySelector('.fixed-controls')?.remove();
      window.addEventListener('message', ({ data }) => {
        if (data?.type === 'setTheme') document.documentElement.dataset.theme = data.theme;
      });
      const report = () => window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
      new ResizeObserver(report).observe(document.documentElement);
      report();
    }());
  </script>
</body>
</html>
