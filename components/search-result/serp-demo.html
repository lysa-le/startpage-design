<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SERP Demo — Startpage Design System</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>
    /* ─────────────────────────────────────────────
       Dark mode token overrides
       ───────────────────────────────────────────── */
    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);

      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);
      --color-text-inverted:  var(--color-black-800);
      --color-text-brandblue: var(--color-brand-blue-200);
      --color-text-link:      var(--color-brand-blue-200);

      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-200);
      --color-icon-tertiary:  var(--color-midnight-100);

      --color-button-brandblue:          var(--color-brand-blue-200);
      --color-button-brandbluehover:     var(--color-brand-blue-300);
      --color-button-productfilled:      var(--color-black-550);
      --color-button-productfilledhover: var(--color-black-400);
      --color-button-inactive:           var(--color-black-600);

      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-secondary:      var(--color-black-550);
      --color-stroke-primary-button: var(--color-brand-blue-200);

      --color-accent-gold:     var(--color-gold-200);
      --color-accent-gold-alt: var(--color-gold-500);
    }

    /* ─────────────────────────────────────────────
       Page scaffold
       ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-family);
      transition: background-color 0.2s ease, color 0.2s ease;
      min-height: 100vh;
    }

    /* ── Search header ── */
    .serp-header {
      border-bottom: var(--border-stroke-sm) solid var(--color-stroke-secondary);
      padding: var(--spacing-20) var(--spacing-48);
      display: flex;
      align-items: center;
      gap: var(--spacing-32);
      position: sticky;
      top: 0;
      background-color: var(--color-background-primary);
      z-index: 10;
    }

    .serp-logo {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-bold);
      color: var(--color-text-link);
      letter-spacing: -0.01em;
      white-space: nowrap;
      text-decoration: none;
      flex-shrink: 0;
    }

    .serp-search-bar {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
      width: 598px;
      height: 48px;
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      border-radius: var(--radius-full);
      padding: 0 var(--spacing-20);
      background-color: var(--color-background-primary);
      flex-shrink: 0;
      transition: border-color 0.15s ease;
    }

    .serp-search-bar:focus-within {
      border-color: var(--color-stroke-primary-button);
    }

    .serp-search-bar__input {
      flex: 1;
      border: none;
      outline: none;
      background: none;
      font-family: var(--font-family);
      font-size: var(--font-body-md);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
      min-width: 0;
    }

    /* Remove browser search input chrome */
    .serp-search-bar__input::-webkit-search-cancel-button,
    .serp-search-bar__input::-webkit-search-decoration { -webkit-appearance: none; }

    .serp-search-bar__input::placeholder {
      color: var(--color-text-tertiary);
      opacity: 0.6;
    }

    .serp-search-bar__clear {
      display: none;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--color-text-tertiary);
      padding: var(--spacing-4);
      border-radius: var(--radius-full);
      flex-shrink: 0;
      transition: color 0.15s ease, background-color 0.15s ease;
    }

    .serp-search-bar__clear:hover {
      color: var(--color-text-primary);
      background-color: var(--color-background-secondary);
    }

    .serp-search-bar__clear.visible { display: flex; }

    .serp-search-bar__icon {
      width: 20px;
      height: 20px;
      color: var(--color-icon-secondary);
      flex-shrink: 0;
    }

    /* ── Results body ── */
    .serp-body {
      padding: var(--spacing-32) var(--spacing-48);
      max-width: 694px;
    }

    .serp-meta {
      font-size: var(--font-body-xs);
      color: var(--color-text-tertiary);
      margin-bottom: var(--spacing-24);
      min-height: 18px;
    }

    /* ── Results list ── */
    .results-list {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-32);
      max-width: 598px;
    }

    /* ── Result entry animation ── */
    .algo-result, .ad-result {
      animation: fadeIn 0.15s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Empty state ── */
    .serp-empty {
      max-width: 598px;
      padding: var(--spacing-48) 0;
      display: flex;
      flex-direction: column;
      gap: var(--spacing-12);
    }

    .serp-empty__title {
      font-size: var(--font-body-lg);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .serp-empty__sub {
      font-size: var(--font-body-sm);
      color: var(--color-text-secondary);
    }

    /* ── Match highlight ── */
    mark {
      background: none;
      color: inherit;
      font-weight: var(--font-weight-semibold);
    }

    /* ─────────────────────────────────────────────
       Organic result — algo-result
       ───────────────────────────────────────────── */
    .algo-result {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
      width: 100%;
    }

    .algo-result__source {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .algo-result__favicon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .algo-result__source-info {
      display: flex;
      flex-direction: column;
      line-height: var(--font-body-sm-lh);
    }

    .algo-result__site-name {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .algo-result__url {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
    }

    .algo-result__content {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
    }

    .algo-result__title {
      font-size: var(--font-body-lg);
      line-height: var(--font-body-lg-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
      display: block;
    }

    .algo-result__title:hover { text-decoration: underline; }

    .algo-result__description {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .algo-result__av-badge {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .algo-result__av-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: var(--color-icon-secondary);
    }

    .algo-result__av-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
    }

    .algo-result__av-label:hover { text-decoration: underline; }

    /* ─────────────────────────────────────────────
       Ad result — ad-result
       ───────────────────────────────────────────── */
    .ad-result {
      --ad-gap: 10px;
      display: flex;
      flex-direction: column;
      gap: var(--ad-gap);
      width: 100%;
    }

    .ad-result__sponsored {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-secondary);
    }

    .ad-result__source {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .ad-result__favicon {
      width: 28px;
      height: 28px;
      border-radius: var(--radius-full);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .ad-result__source-meta {
      display: flex;
      align-items: center;
      gap: var(--spacing-16);
    }

    .ad-result__source-info {
      display: flex;
      flex-direction: column;
      line-height: var(--font-body-sm-lh);
    }

    .ad-result__site-name {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .ad-result__url {
      font-size: var(--font-body-sm);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
    }

    .ad-result__dots-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      padding: var(--spacing-4);
      cursor: pointer;
      color: var(--color-text-tertiary);
      border-radius: var(--radius-sm);
      transition: color 0.15s ease, background-color 0.15s ease;
      flex-shrink: 0;
    }

    .ad-result__dots-btn:hover {
      color: var(--color-text-secondary);
      background-color: var(--color-background-secondary);
    }

    .ad-result__body {
      display: flex;
      align-items: flex-start;
      gap: 19px;
    }

    .ad-result__text {
      display: flex;
      flex-direction: column;
      gap: var(--spacing-4);
      flex: 1;
      min-width: 0;
    }

    .ad-result__title {
      font-size: var(--font-body-lg);
      line-height: var(--font-body-lg-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
      display: block;
    }

    .ad-result__title:hover { text-decoration: underline; }

    .ad-result__description {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-primary);
    }

    .ad-result__image {
      width: 100px;
      height: 100px;
      border-radius: var(--radius-lg);
      background-color: var(--color-background-secondary);
      flex-shrink: 0;
    }

    .ad-result__rating {
      display: flex;
      align-items: center;
      gap: var(--spacing-12);
    }

    .ad-result__stars { display: flex; align-items: center; }

    .star { width: 16px; height: 16px; flex-shrink: 0; }
    .star--filled { color: var(--color-accent-gold); }
    .star--empty  { color: var(--color-stroke-primary); }

    .ad-result__rating-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-tertiary);
      white-space: nowrap;
    }

    .ad-result__sitelinks {
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
      flex-wrap: wrap;
    }

    .ad-result__sitelink {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      font-weight: var(--font-weight-regular);
      color: var(--color-text-link);
      text-decoration: none;
    }

    .ad-result__sitelink:hover { text-decoration: underline; }

    .ad-result__sitelink-sep {
      color: var(--color-text-tertiary);
      line-height: var(--font-body-sm-lh);
      user-select: none;
    }

    /* ── Fixed controls (back link + theme toggle) ── */
    .fixed-controls {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: flex;
      align-items: center;
      gap: var(--spacing-8);
      z-index: 100;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      text-decoration: none;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }
    .back-link:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }

    /* ── Theme toggle ── */
    .theme-toggle {
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
    }

    .theme-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }
  </style>
</head>
<body>

  <div class="fixed-controls" id="fixedControls">
    <a class="back-link" href="../../index.html">← Library</a>
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
      <span id="themeIcon">☀️</span>
      <span id="themeLabel">Light</span>
    </button>
  </div>

  <!-- Inline SVG sprite (file:// safe) -->
  <svg style="display:none" xmlns="http://www.w3.org/2000/svg">
    <symbol id="icon-star-filled" viewBox="0 0 24 24">
      <path d="M12 2l2.9 6.26 6.9.94-5 4.86 1.18 6.86L12 17.77l-6 3.15L7.18 14 2.2 9.2l6.9-.94L12 2z" fill="currentColor"/>
    </symbol>
    <symbol id="icon-star-empty" viewBox="0 0 24 24">
      <path d="M12 2l2.9 6.26 6.9.94-5 4.86 1.18 6.86L12 17.77l-6 3.15L7.18 14 2.2 9.2l6.9-.94L12 2z" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
    </symbol>
    <symbol id="icon-dots-vertical" viewBox="0 0 4 16">
      <circle cx="2" cy="2"  r="1.5" fill="currentColor"/>
      <circle cx="2" cy="8"  r="1.5" fill="currentColor"/>
      <circle cx="2" cy="14" r="1.5" fill="currentColor"/>
    </symbol>
    <symbol id="icon-search-serp" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/>
      <line x1="16.5" y1="16.5" x2="22" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-close-sm" viewBox="0 0 16 16">
      <line x1="3" y1="3" x2="13" y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="13" y1="3" x2="3"  y2="13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </symbol>
    <symbol id="icon-av" viewBox="0 0 16 8" fill="none">
      <path d="M8.01674 0C-3.04828 0 -0.922528 8 4.05523 8C5.05273 8 5.99198 7.56896 6.59073 6.83625L7.23399 6.04896C7.62549 5.57 8.40824 5.57 8.79974 6.04896L9.44299 6.83625C10.0415 7.56896 10.9807 8 11.9782 8C16.7248 8 19.244 0 8.01674 0ZM4.59998 5.09083C3.57348 5.09083 2.90598 4.55625 2.59798 4.23562C2.46723 4.09958 2.46723 3.90042 2.59798 3.76417C2.90598 3.44333 3.57323 2.90896 4.59998 2.90896C5.62673 2.90896 6.29398 3.44354 6.60198 3.76417C6.73273 3.90021 6.73273 4.09937 6.60198 4.23562C6.29398 4.55646 5.62648 5.09083 4.59998 5.09083ZM11.4 5.09083C10.3735 5.09083 9.70599 4.55625 9.39799 4.23562C9.26724 4.09958 9.26724 3.90042 9.39799 3.76417C9.70599 3.44333 10.3732 2.90896 11.4 2.90896C12.4267 2.90896 13.094 3.44354 13.402 3.76417C13.5327 3.90021 13.5327 4.09937 13.402 4.23562C13.094 4.55646 12.4265 5.09083 11.4 5.09083Z" fill="currentColor"/>
    </symbol>
  </svg>

  <!-- ── Search header ── -->
  <header class="serp-header">
    <div class="serp-search-bar">
      <input
        class="serp-search-bar__input"
        type="search"
        id="searchInput"
        value="best cat food"
        placeholder="Search…"
        aria-label="Search query"
        autocomplete="off"
        spellcheck="false"
      />
      <button class="serp-search-bar__clear" id="clearBtn" aria-label="Clear search">
        <svg width="16" height="16" aria-hidden="true"><use href="#icon-close-sm"/></svg>
      </button>
      <svg class="serp-search-bar__icon" aria-hidden="true">
        <use href="#icon-search-serp"/>
      </svg>
    </div>
  </header>

  <!-- ── Results body ── -->
  <main class="serp-body">
    <p class="serp-meta" id="serpMeta" aria-live="polite"></p>
    <div class="results-list" id="resultsList" aria-label="Search results"></div>
  </main>

  <script>
    /* ─────────────────────────────────────────────
       Helpers
       ───────────────────────────────────────────── */

    function titleCase(str) {
      return str.replace(/\w\S*/g, w => w.charAt(0).toUpperCase() + w.slice(1).toLowerCase());
    }

    function slug(str) {
      return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    /* Deterministic pick — same query always returns the same item */
    function hash(str) {
      let h = 0;
      for (const c of str) h = (Math.imul(31, h) + c.charCodeAt(0)) | 0;
      return Math.abs(h);
    }
    function pick(arr, seed) { return arr[hash(seed) % arr.length]; }

    /* Pick a subreddit that feels relevant to the query */
    function subreddit(q) {
      const map = {
        cat:'cats', cats:'cats', kitten:'cats', feline:'cats',
        dog:'dogs', dogs:'dogs', puppy:'dogs', canine:'dogs',
        food:'food', recipe:'recipes', cooking:'cooking', baking:'Baking',
        phone:'tech', laptop:'laptops', computer:'hardware', pc:'hardware',
        game:'gaming', gaming:'gaming', console:'gaming',
        run:'running', running:'running', fitness:'fitness', workout:'fitness',
        coffee:'coffee', tea:'tea', wine:'wine',
        shoe:'malefashionadvice', shoes:'malefashionadvice', sneaker:'Sneakers',
        car:'cars', truck:'cars', automotive:'cars', ev:'electricvehicles',
        travel:'travel', hotel:'travel', flight:'travel',
        book:'books', reading:'books',
        camera:'photography', photo:'photography',
        bike:'bicycling', cycling:'bicycling',
        plant:'houseplants', garden:'gardening',
      };
      for (const word of q.toLowerCase().split(/\s+/)) {
        if (map[word]) return map[word];
      }
      return 'AskReddit';
    }

    /* ─────────────────────────────────────────────
       Result generator
       Produces 10 results (2 ads + 8 organic) tuned
       to the query. Same query always returns the same
       results — different queries return different ones.
       ───────────────────────────────────────────── */

    function generateResults(rawQuery) {
      const q      = rawQuery.trim();
      const qTitle = titleCase(q);
      const qSlug  = slug(q);

      /* First two words form the brand name used in ad #2 */
      const brandWords = q.split(/\s+/).slice(0, 2);
      const brand      = brandWords.map(w => titleCase(w)).join('');
      const brandLower = brand.toLowerCase();

      const reviewSite = pick(['Wirecutter','The Verge','CNET','Tom\'s Guide','Good Housekeeping','Spruce','PCMag'], q);
      const lifeSite   = pick(['Forbes','Lifehacker','Popular Science','Business Insider','Time'], q + 'life');
      const hours      = pick([60, 80, 100, 120, 150, 200], q);
      const count      = pick([7, 8, 9, 10, 11, 12], q + 'count');
      const approx     = pick([182000, 241000, 387000, 524000, 671000, 892000], q).toLocaleString();
      const sub        = subreddit(q);

      return { approx, results: [

        /* ── Ad 1: Amazon ── */
        {
          type: 'ad',
          siteName: 'Amazon',
          url: `http://www.amazon.com/s?k=${encodeURIComponent(q)}`,
          title: `Shop ${qTitle} — Free Delivery on Orders $35+`,
          description: `Find the best ${q} from thousands of top-rated brands. Verified customer reviews, easy returns, and fast delivery. Save more with Amazon Prime and Subscribe & Save.`,
          hasImage: true,
          stars: 4,
          ratingLabel: 'rating for amazon.com',
          sitelinks: ['Today\'s Deals', 'Top Rated', 'Free Returns', 'Subscribe & Save'],
        },

        /* ── Organic 1: expert review roundup ── */
        {
          type: 'organic',
          siteName: reviewSite,
          url: `https://${slug(reviewSite)}.com \u203a reviews \u203a best-${qSlug}`,
          title: `The Best ${qTitle} of 2026`,
          description: `After more than ${hours} hours of research and hands-on testing, our experts identified the top picks for ${q}. We evaluated quality, value, and durability to find the best option for every need and budget.`,
        },

        /* ── Organic 2: Reddit ── */
        {
          type: 'organic',
          siteName: 'Reddit',
          url: `https://reddit.com \u203a r \u203a ${sub} \u203a best_${slug(q)}`,
          title: `Best ${qTitle}? What does Reddit recommend? : r/${sub}`,
          description: `r/${sub} — 2.4k comments. "Looking for the best ${q} — what have you tried that's actually worth it?" Real user reviews, expert picks, and community consensus from people who've tested dozens of options.`,
        },

        /* ── Organic 3: Wikipedia ── */
        {

    /* ─────────────────────────────────────────────
       Highlight — bolds matched words in descriptions
       ───────────────────────────────────────────── */
    function highlight(text, query) {
      if (!query.trim()) return text;
      const words = query.trim().split(/\s+/).filter(Boolean);
      const pattern = new RegExp(`(${words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')).join('|')})`, 'gi');
      return text.replace(pattern, '<mark>$1</mark>');
    }

    /* ─────────────────────────────────────────────
       Render helpers
       ───────────────────────────────────────────── */

    function renderStars(count) {
      let html = '';
      for (let i = 0; i < 5; i++) {
        html += i < count
          ? `<svg class="star star--filled" aria-hidden="true"><use href="#icon-star-filled"/></svg>`
          : `<svg class="star star--empty"  aria-hidden="true"><use href="#icon-star-empty"/></svg>`;
      }
      return html;
    }

    function renderSitelinks(links, query) {
      return links.map((link, i) => {
        const sep = i < links.length - 1
          ? `<span class="ad-result__sitelink-sep" aria-hidden="true">·</span>`
          : '';
        return `<a class="ad-result__sitelink" href="#">${highlight(link, query)}</a>${sep}`;
      }).join('');
    }

    function renderAd(data, query) {
      const imageHtml = data.hasImage
        ? `<div class="ad-result__image" aria-hidden="true"></div>`
        : '';

      const ratingHtml = data.stars != null ? `
        <div class="ad-result__rating" aria-label="${data.stars} out of 5 stars — ${data.ratingLabel}">
          <div class="ad-result__stars" aria-hidden="true">${renderStars(data.stars)}</div>
          <span class="ad-result__rating-label">${data.ratingLabel}</span>
        </div>` : '';

      const sitelinksHtml = data.sitelinks?.length
        ? `<div class="ad-result__sitelinks">${renderSitelinks(data.sitelinks, query)}</div>`
        : '';

      return `
        <div class="ad-result">
          <span class="ad-result__sponsored">Sponsored</span>
          <div class="ad-result__source">
            <div class="ad-result__favicon" aria-hidden="true"></div>
            <div class="ad-result__source-meta">
              <div class="ad-result__source-info">
                <span class="ad-result__site-name">${highlight(data.siteName, query)}</span>
                <span class="ad-result__url">${data.url}</span>
              </div>
              <button class="ad-result__dots-btn" aria-label="About this ad">
                <svg width="4" height="16" aria-hidden="true"><use href="#icon-dots-vertical"/></svg>
              </button>
            </div>
          </div>
          <div class="ad-result__body">
            <div class="ad-result__text">
              <a class="ad-result__title" href="#">${data.title}</a>
              <p class="ad-result__description">${highlight(data.description, query)}</p>
            </div>
            ${imageHtml}
          </div>
          ${ratingHtml}
          ${sitelinksHtml}
        </div>`;
    }

    function renderOrganic(data, query) {
      return `
        <div class="algo-result">
          <div class="algo-result__source">
            <div class="algo-result__favicon" aria-hidden="true"></div>
            <div class="algo-result__source-info">
              <span class="algo-result__site-name">${highlight(data.siteName, query)}</span>
              <span class="algo-result__url">${data.url}</span>
            </div>
          </div>
          <div class="algo-result__content">
            <a class="algo-result__title" href="#">${data.title}</a>
            <p class="algo-result__description">${highlight(data.description, query)}</p>
            <div class="algo-result__av-badge">
              <svg class="algo-result__av-icon" aria-hidden="true">
                <use href="#icon-av"/>
              </svg>
              <a class="algo-result__av-label" href="#">Visit in Anonymous View</a>
            </div>
          </div>
        </div>`;
    }

    /* ─────────────────────────────────────────────
       Render the page
       ───────────────────────────────────────────── */
    function render(query) {
      const list     = document.getElementById('resultsList');
      const meta     = document.getElementById('serpMeta');
      const clearBtn = document.getElementById('clearBtn');

      clearBtn.classList.toggle('visible', query.length > 0);

      if (!query.trim()) {
        list.innerHTML = `
          <div class="serp-empty">
            <p class="serp-empty__title">Type a query to see results</p>
            <p class="serp-empty__sub">Try "running shoes", "coffee makers", or "cat food".</p>
          </div>`;
        meta.textContent = '';
        return;
      }

      const { approx, results } = generateResults(query);
      const adCount      = results.filter(r => r.type === 'ad').length;
      const organicCount = results.filter(r => r.type === 'organic').length;
      meta.textContent   = `About ${approx} results — ${adCount} sponsored, ${organicCount} organic`;

      list.innerHTML = results
        .map(r => r.type === 'ad' ? renderAd(r, query) : renderOrganic(r, query))
        .join('');
    }

    /* ─────────────────────────────────────────────
       Input wiring
       ───────────────────────────────────────────── */
    const input    = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearBtn');
    let debounce;

    input.addEventListener('input', () => {
      clearTimeout(debounce);
      debounce = setTimeout(() => render(input.value), 180);
    });

    clearBtn.addEventListener('click', () => {
      input.value = '';
      input.focus();
      render('');
    });

    /* Initial render */
    render(input.value);

    /* ─────────────────────────────────────────────
       Theme toggle
       ───────────────────────────────────────────── */
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon   = document.getElementById('themeIcon');
    const label  = document.getElementById('themeLabel');

    applyTheme(localStorage.getItem('theme') || 'light');
    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent   = theme === 'dark' ? '🌙' : '☀️';
      label.textContent  = theme === 'dark' ? 'Dark'  : 'Light';
    }

    /* ── Iframe embed: theme sync + auto-sizing ── */
    (function () {
      if (window === window.parent) return;
      document.querySelector('.fixed-controls')?.remove();
      window.addEventListener('message', ({ data }) => {
        if (data?.type === 'setTheme') document.documentElement.dataset.theme = data.theme;
      });
      const report = () => window.parent.postMessage({ type: 'resize', height: document.documentElement.scrollHeight }, '*');
      new ResizeObserver(report).observe(document.documentElement);
      report();
    }());
  </script>
