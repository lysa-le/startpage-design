<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Sprite — Startpage Design System</title>
  <link rel="stylesheet" href="../../tokens.css">
  <style>

    [data-theme="dark"] {
      --color-background-primary:    var(--color-black-900);
      --color-background-secondary:  var(--color-black-550);
      --color-background-tertiary:   var(--color-black-800);
      --color-background-quaternary: var(--color-black-650);
      --color-text-primary:   var(--color-whisper-100);
      --color-text-secondary: var(--color-midnight-200);
      --color-text-tertiary:  var(--color-midnight-100);
      --color-icon-primary:   var(--color-whisper-200);
      --color-icon-secondary: var(--color-brand-blue-200);
      --color-stroke-primary:        var(--color-black-400);
      --color-stroke-primary-button: var(--color-brand-blue-200);
    }

    .theme-toggle {
      position: fixed;
      top: var(--spacing-24);
      right: var(--spacing-24);
      display: inline-flex;
      align-items: center;
      gap: var(--spacing-8);
      padding: var(--spacing-8) var(--spacing-16);
      border-radius: var(--radius-full);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      background-color: var(--color-background-primary);
      color: var(--color-text-secondary);
      font-family: var(--font-family);
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      cursor: pointer;
      transition: background-color 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      z-index: 100;
    }
    .theme-toggle:hover {
      color: var(--color-text-primary);
      border-color: var(--color-stroke-primary-button);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-family);
      background: var(--color-background-quaternary);
      color: var(--color-text-primary);
      padding: var(--spacing-48);
      min-height: 100vh;
    }

    h1 {
      font-size: var(--font-heading-xs);
      line-height: var(--font-heading-xs-lh);
      font-weight: var(--font-weight-bold);
      margin-bottom: var(--spacing-8);
    }

    .page-subtitle {
      font-size: var(--font-body-sm);
      line-height: var(--font-body-sm-lh);
      color: var(--color-text-secondary);
      margin-bottom: var(--spacing-48);
    }

    .section {
      margin-bottom: var(--spacing-48);
    }

    .section-label {
      font-size: var(--font-body-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--spacing-20);
    }

    .icon-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-24);
    }

    .icon-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--spacing-8);
      width: 72px;
    }

    .icon-swatch {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--color-background-primary);
      border: var(--border-stroke-sm) solid var(--color-stroke-primary);
      border-radius: var(--radius-md);
      color: var(--color-icon-primary);
    }

    .icon-swatch svg {
      width: 20px;
      height: 20px;
    }

    .icon-label {
      font-size: var(--font-body-xs);
      line-height: var(--font-body-xs-lh);
      color: var(--color-text-tertiary);
      text-align: center;
      word-break: break-all;
    }

  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
    <span id="themeIcon">☀️</span>
    <span id="themeLabel">Light</span>
  </button>

  <h1>Icon Sprite</h1>
  <p class="page-subtitle">7 static icons — all use <code>currentColor</code>, sized by the component</p>

  <!-- ── Navigation & Controls ── -->
  <div class="section">
    <p class="section-label">Navigation &amp; Controls</p>
    <div class="icon-grid">
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-filter"/></svg>
        </div>
        <span class="icon-label">icon-filter</span>
      </div>
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-hamburger"/></svg>
        </div>
        <span class="icon-label">icon-hamburger</span>
      </div>
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-settings"/></svg>
        </div>
        <span class="icon-label">icon-settings</span>
      </div>
    </div>
  </div>

  <!-- ── Actions ── -->
  <div class="section">
    <p class="section-label">Actions</p>
    <div class="icon-grid">
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-download"/></svg>
        </div>
        <span class="icon-label">icon-download</span>
      </div>
    </div>
  </div>

  <!-- ── Media ── -->
  <div class="section">
    <p class="section-label">Media</p>
    <div class="icon-grid">
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-image"/></svg>
        </div>
        <span class="icon-label">icon-image</span>
      </div>
      <div class="icon-item">
        <div class="icon-swatch">
          <svg style="width:16px;height:8px" aria-hidden="true"><use href="#icon-av"/></svg>
        </div>
        <span class="icon-label">icon-av</span>
      </div>
    </div>
  </div>

  <!-- ── Feedback ── -->
  <div class="section">
    <p class="section-label">Feedback</p>
    <div class="icon-grid">
      <div class="icon-item">
        <div class="icon-swatch">
          <svg aria-hidden="true"><use href="#icon-info"/></svg>
        </div>
        <span class="icon-label">icon-info</span>
      </div>
    </div>
  </div>

  <script>
    const html   = document.documentElement;
    const toggle = document.getElementById('themeToggle');
    const icon   = document.getElementById('themeIcon');
    const label  = document.getElementById('themeLabel');

    const saved = localStorage.getItem('theme') || 'light';
    applyTheme(saved);

    toggle.addEventListener('click', () => {
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      applyTheme(next);
      localStorage.setItem('theme', next);
    });

    function applyTheme(theme) {
      html.dataset.theme = theme;
      icon.textContent  = theme === 'dark' ? '🌙' : '☀️';
      label.textContent = theme === 'dark' ? 'Dark' : 'Light';
    }
  </script>

</body>
</html>
